<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      // GitHub Pages で SPA ルーティングを維持するためのリダイレクト
      const base = "/recipe-book/";
      const path = location.pathname.replace(base, "");
      const target = `${base}?p=${encodeURIComponent(path + location.search + location.hash)}`;
      location.replace(target);
    </script>
  </body>
</html>
